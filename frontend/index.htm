<!DOCTYPE html>
<html>
<head>
  <title>My Affiliate Store</title>
</head>
<body>

  <h1>🔥 My Products</h1>
  <div id="products"></div>

  <script>
    fetch("https://affiliate-website-9jb0.onrender.com/products")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("products");

        data.forEach(p => {
          container.innerHTML += `
            <div style="border:1px solid black; margin:10px; padding:10px;">
              <h3>${p.name}</h3>
              <p>Price: ${p.price}</p>
              <a href="${p.link}" target="_blank">Buy Now</a>
            </div>
          `;
        });
      })
      .catch(err => {
        document.getElementById("products").innerHTML = "Error loading products";
      });
  </script>

</body>
</html>
