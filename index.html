<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Affiliate Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    h1 {
      margin: 0;
      padding: 18px;
      text-align: center;
      background: #111;
      color: white;
    }
    .search-bar {
      text-align: center;
      padding: 20px;
      background: white;
    }
    .search-bar input {
      width: 260px;
      padding: 10px;
      font-size: 16px;
    }
    .search-bar button {
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
      margin-left: 8px;
    }
    #products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      width: 260px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.12);
      text-align: center;
    }
    .card img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      margin-bottom: 10px;
    }
    .card h3 {
      font-size: 17px;
      min-height: 52px;
    }
    .price {
      color: green;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      background: orange;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    .msg {
      text-align: center;
      padding: 30px;
      font-size: 18px;
      width: 100%;
    }
  </style>
</head>
<body>

  <h1>🔥 My Affiliate Store</h1>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search Amazon products" value="earbuds" />
    <button onclick="loadProducts()">Search</button>
  </div>

  <div id="products"></div>

  <script>
    async function loadProducts() {
      const q = document.getElementById("searchInput").value.trim() || "earbuds";
      const container = document.getElementById("products");
      container.innerHTML = '<div class="msg">Loading...</div>';

      try {
        const res = await fetch(
          `https://affiliate-website-9jb0.onrender.com/amazon-search?q=${encodeURIComponent(q)}`
        );
        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = '<div class="msg">No Products Found</div>';
          return;
        }

        container.innerHTML = "";
        data.forEach(product => {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <img src="${product.image || ""}" alt="${product.name}">
            <h3>${product.name}</h3>
            <p class="price">${product.price}</p>
            <a class="btn" href="${product.detailPage}" target="_blank">Buy Now</a>
          `;
          container.appendChild(div);
        });
      } catch (error) {
        container.innerHTML = '<div class="msg">Error loading Amazon products</div>';
      }
    }

    loadProducts();
  </script>

</body>
</html>
