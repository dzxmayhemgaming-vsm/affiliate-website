<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Affiliate Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    h1 {
      margin: 0;
      padding: 18px;
      text-align: center;
      background: #111;
      color: white;
    }
    #products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      width: 260px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.12);
      text-align: center;
    }
    .card img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      margin-bottom: 12px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .card h3 {
      font-size: 17px;
      min-height: 52px;
      margin: 0 0 10px;
    }
    .category {
      font-size: 14px;
      color: #555;
      margin-bottom: 8px;
    }
    .price {
      color: green;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      background: orange;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    .msg {
      text-align: center;
      padding: 30px;
      font-size: 18px;
      width: 100%;
    }
  </style>
</head>
<body>

  <h1>🔥 My Affiliate Store</h1>
  <div id="products"></div>

  <script>
    fetch("https://affiliate-backend-1-6avm.onrender.com/products")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("products");

        if (!data || data.length === 0) {
          container.innerHTML = '<div class="msg">No Products Found</div>';
          return;
        }

        container.innerHTML = "";

        data.forEach(product => {
          const imageUrl = product.image && product.image.trim() !== ""
            ? product.image
            : "https://placehold.co/200x200?text=No+Image";

          const categoryText = product.category && product.category.trim() !== ""
            ? product.category
            : "Electronics";

          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <img src="${imageUrl}" alt="${product.name}" onerror="this.src='https://placehold.co/200x200?text=No+Image'">
            <h3>${product.name}</h3>
            <div class="category">${categoryText}</div>
            <p class="price">₹${product.price}</p>
            <a class="btn" href="${product.link}" target="_blank">Buy Now</a>
          `;
          container.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById("products").innerHTML =
          '<div class="msg">Error loading products</div>';
      });
  </script>

</body>
</html>
