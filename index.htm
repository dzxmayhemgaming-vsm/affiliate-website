<!DOCTYPE html>
<html>
<head>
  <title>My Affiliate Store</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      background: black;
      color: white;
      padding: 15px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      width: 250px;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    .card h3 {
      font-size: 18px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      padding: 10px;
      background: orange;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>🔥 My Affiliate Store</h1>

  <div class="container" id="products"></div>

  <script>
    fetch("https://affiliate-website-9jb0.onrender.com/products")
      .then(res => res.json())
      .then(data => {

        const container = document.getElementById("products");

        if(data.length === 0){
          container.innerHTML = "<h2>No Products Found 😢</h2>";
        }

        data.forEach(p => {
          container.innerHTML += `
            <div class="card">
              <h3>${p.name}</h3>
              <p class="price">₹ ${p.price}</p>
              <a href="${p.link}" target="_blank" class="btn">Buy Now</a>
            </div>
          `;
        });

      })
      .catch(err => {
        document.getElementById("products").innerHTML = "⚠️ Error loading products";
      });
  </script>

</body>
</html>
